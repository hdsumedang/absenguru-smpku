<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABSEN GURU GPS-SMPKU</title>
	<link rel="icon" href="https://lh3.googleusercontent.com/d/16MwjcmTkHw4wVn3kKHqbZVj4WTbSRL5I" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    </style>
</head>
<body>

    <iframe 
        id="appFrame"
        src="" 
        width="100%" 
        height="100%" 
        style="border: none;" 
        allow="geolocation; camera" 
        allowfullscreen>
    </iframe>

    <script>
        // Membaca halaman apa yang sedang ingin dibuka (login, absen, dsb)
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page') || 'index';
        
        // Ganti dengan link Web App /exec Apps Script asli Anda
        const webAppUrl = "https://script.google.com/macros/s/AKfycbyPpyD_Lj3dNEgfMAMUDeNq07w-UA8UfvwzogBlf08M6nV3BbBQqu6YX7zpFkqq3e1h/exec";
        
        // Memuat iframe sesuai halaman
        document.getElementById('appFrame').src = webAppUrl + "?page=" + page;
    </script>

</body>
</html>

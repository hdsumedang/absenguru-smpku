<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABSEN GURU GPS - SMPKU</title>

    <link rel="icon" href="https://lh3.googleusercontent.com/d/16MwjcmTkHw4wVn3kKHqbZVj4WTbSRL5I">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,body{
            width:100%;
            height:100%;
            overflow:hidden;
            background:#fff;
        }

        #appFrame{
            width:100%;
            height:100vh;
            border:none;
        }
    </style>
</head>

<body>

<iframe
    id="appFrame"
    allow="geolocation; camera"
    allowfullscreen>
</iframe>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPpyD_Lj3dNEgfMAMUDeNq07w-UA8UfvwzogBlf08M6nV3BbBQqu6YX7zpFkqq3e1h/exec";

// membaca parameter ?page=
const params = new URLSearchParams(window.location.search);
const page = params.get("page") || "index";

// Membuat URL tujuan
const targetUrl = `${WEB_APP_URL}?page=${encodeURIComponent(page)}`;

// Memuat iframe
document.getElementById("appFrame").src = targetUrl;
</script>

</body>
</html>
